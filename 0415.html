<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>JavaScript 基础练习</title>
</head>
<body>
    <h1>JavaScript 基础练习</h1>
    
    <!-- 1. 变量定义 -->
    <h2>1. 变量定义</h2>
    <script>
        var name = "张三";
        let age = 25;
        const PI = 3.14159;
        console.log(name, age, PI);
    </script>
    
    <!-- 2. 数据类型 -->
    <h2>2. 数据类型</h2>
    <script>
        let str = "Hello";
        let num = 100;
        let bool = true;
        let arr = [1, 2, 3];
        let obj = {name: "张三", age: 25};
        console.log(typeof str, typeof num, typeof bool);
    </script>
    
    <!-- 3. 表达式 -->
    <h2>3. 表达式</h2>
    <script>
        let sum = 10 + 5;
        let isAdult = age >= 18;
        console.log("sum:", sum, "isAdult:", isAdult);
    </script>
    
    <!-- 4. 流程控制 -->
    <h2>4. 流程控制</h2>
    <script>
        if (age >= 18) {
            console.log("已成年");
        } else {
            console.log("未成年");
        }
        
        for (let i = 0; i < 5; i++) {
            console.log("第" + i + "次循环");
        }
    </script>
    
    <!-- 5. 函数 -->
    <h2>5. 函数</h2>
    <script>
        function greet(name) {
            return "你好, " + name;
        }
        console.log(greet("张三"));
    </script>
</body>
</html>
