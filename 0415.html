<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>JavaScript 基础练习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: white; text-align: center; font-size: 2em; margin-bottom: 30px; }
        
        .section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        input, button {
            padding: 10px 15px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        input { width: 200px; margin-right: 10px; }
        button {
            background: #667eea;
            color: white;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #764ba2; }
        
        #output {
            background: #1e1e1e;
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            min-height: 100px;
            font-family: "Fira Code", Consolas, monospace;
            white-space: pre-wrap;
        }
        
        .interactive-demo { margin: 15px 0; }
        .interactive-demo p { margin: 10px 0; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>JavaScript 基础练习（交互版）</h1>
        
        <!-- 1. 变量定义 -->
        <div class="section">
            <h2>1. 变量定义</h2>
            <div class="interactive-demo">
                <p>输入你的名字：<input type="text" id="nameInput" placeholder="输入名字"></p>
                <p>输入你的年龄：<input type="number" id="ageInput" placeholder="输入年龄"></p>
                <button onclick="testVariables()">测试变量</button>
            </div>
            <div id="output1"></div>
        </div>
        
        <!-- 2. 数据类型 -->
        <div class="section">
            <h2>2. 数据类型</h2>
            <div class="interactive-demo">
                <button onclick="testTypes()">检测数据类型</button>
            </div>
            <div id="output2"></div>
        </div>
        
        <!-- 3. 表达式 -->
        <div class="section">
            <h2>3. 表达式</h2>
            <div class="interactive-demo">
                <p>a = <input type="number" id="numA" value="10"></p>
                <p>b = <input type="number" id="numB" value="3"></p>
                <button onclick="testExpressions()">计算表达式</button>
            </div>
            <div id="output3"></div>
        </div>
        
        <!-- 4. 流程控制 -->
        <div class="section">
            <h2>4. 流程控制</h2>
            <div class="interactive-demo">
                <p>输入数字：<input type="number" id="compareNum" placeholder="输入数字"></p>
                <button onclick="testControlFlow()">判断奇偶</button>
                <button onclick="testLoop()">打印1-5</button>
            </div>
            <div id="output4"></div>
        </div>
        
        <!-- 5. 函数 -->
        <div class="section">
            <h2>5. 函数</h2>
            <div class="interactive-demo">
                <p>输入数字1：<input type="number" id="funcNum1" value="5"></p>
                <p>输入数字2：<input type="number" id="funcNum2" value="3"></p>
                <button onclick="testFunction()">调用函数相加</button>
            </div>
            <div id="output5"></div>
        </div>
        
        <!-- 代码执行区 -->
        <div class="section">
            <h2>6. 自定义代码执行</h2>
            <div class="interactive-demo">
                <textarea id="codeInput" rows="4" style="width:100%;resize:none;border:2px solid #667eea;border-radius:8px;padding:10px;font-family:monospace" placeholder="输入JavaScript代码..."></textarea>
                <br><br>
                <button onclick="runCode()">运行代码</button>
                <button onclick="clearOutput()">清空输出</button>
            </div>
            <div id="output">输出结果：</div>
        </div>
    </div>
    
    <script>
        function appendOutput(id, text) {
            document.getElementById(id).innerHTML += text + '\n';
        }
        
        function testVariables() {
            let name = document.getElementById('nameInput').value || "访客";
            let age = parseInt(document.getElementById('ageInput').value) || 0;
            const PI = 3.14159;
            
            let output = `var name = "${name}"\n`;
            output += `let age = ${age}\n`;
            output += `const PI = ${PI}\n`;
            output += `\nconsole.log(name, age, PI)`;
            
            document.getElementById('output1').innerHTML = '<pre>' + output + '</pre>';
            console.log("变量定义测试:", name, age, PI);
        }
        
        function testTypes() {
            let str = "Hello";
            let num = 100;
            let bool = true;
            let arr = [1, 2, 3];
            let obj = {name: "张三", age: 25};
            
            let output = `typeof "${str}" = ${typeof str}\n`;
            output += `typeof ${num} = ${typeof num}\n`;
            output += `typeof ${bool} = ${typeof bool}\n`;
            output += `typeof [1,2,3] = ${typeof arr}\n`;
            output += `typeof {name:"张三"} = ${typeof obj}`;
            
            document.getElementById('output2').innerHTML = '<pre>' + output + '</pre>';
        }
        
        function testExpressions() {
            let a = parseInt(document.getElementById('numA').value) || 0;
            let b = parseInt(document.getElementById('numB').value) || 0;
            
            let output = `${a} + ${b} = ${a + b}\n`;
            output += `${a} - ${b} = ${a - b}\n`;
            output += `${a} * ${b} = ${a * b}\n`;
            output += `${a} / ${b} = ${(a / b).toFixed(2)}\n`;
            output += `${a} % ${b} = ${a % b}\n`;
            output += `${a} > ${b} = ${a > b}\n`;
            output += `${a} === ${b} = ${a === b}`;
            
            document.getElementById('output3').innerHTML = '<pre>' + output + '</pre>';
        }
        
        function testControlFlow() {
            let num = parseInt(document.getElementById('compareNum').value) || 0;
            let output = '';
            
            if (num % 2 === 0) {
                output = `${num} 是偶数`;
            } else {
                output = `${num} 是奇数`;
            }
            
            document.getElementById('output4').innerHTML = '<pre>' + output + '</pre>';
        }
        
        function testLoop() {
            let output = 'for循环打印 1-5：\n';
            for (let i = 1; i <= 5; i++) {
                output += `第 ${i} 次循环\n`;
            }
            document.getElementById('output4').innerHTML += '<pre>' + output + '</pre>';
        }
        
        function testFunction() {
            let a = parseInt(document.getElementById('funcNum1').value) || 0;
            let b = parseInt(document.getElementById('funcNum2').value) || 0;
            
            function add(x, y) {
                return x + y;
            }
            
            let result = add(a, b);
            let output = `function add(x, y) {\n  return x + y;\n}\n\nadd(${a}, ${b}) = ${result}`;
            
            document.getElementById('output5').innerHTML = '<pre>' + output + '</pre>';
        }
        
        function runCode() {
            let code = document.getElementById('codeInput').value;
            let originalLog = console.log;
            let output = '';
            
            console.log = function(...args) {
                output += args.join(' ') + '\n';
                originalLog.apply(console, args);
            };
            
            try {
                eval(code);
            } catch (e) {
                output += '错误: ' + e.message;
            }
            
            console.log = originalLog;
            document.getElementById('output').innerHTML = '输出结果：\n<pre>' + output + '</pre>';
        }
        
        function clearOutput() {
            document.getElementById('output').innerHTML = '输出结果：';
        }
    </script>
</body>
</html>
