<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>JavaScript 基础知识问答</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: white; text-align: center; font-size: 2em; margin-bottom: 30px; }
        
        .chat-box {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .messages {
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 20px;
        }
        
        .message {
            margin: 10px 0;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 80%;
        }
        
        .user-message {
            background: #667eea;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        
        .bot-message {
            background: #f0f0f0;
            color: #333;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
        }
        
        #questionInput {
            flex: 1;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 14px;
        }
        
        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        button:hover { background: #764ba2; }
        
        .quick-questions {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .quick-questions button {
            background: #e0e0e0;
            color: #333;
            padding: 8px 16px;
            font-size: 12px;
        }
        
        .quick-questions button:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>JavaScript 基础知识问答</h1>
        
        <div class="chat-box">
            <div class="messages" id="messages">
                <div class="message bot-message">
                    你好！我是 JavaScript 学习助手。你可以问我关于 JS 变量、数据类型、表达式、流程控制、函数的问题。
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" id="questionInput" placeholder="输入你的问题..." onkeypress="if(event.key==='Enter')askQuestion()">
                <button onclick="askQuestion()">提问</button>
            </div>
            
            <div class="quick-questions">
                <button onclick="quickAsk('什么是变量？')">什么是变量？</button>
                <button onclick="quickAsk('let和var有什么区别？')">let和var有什么区别？</button>
                <button onclick="quickAsk('JS有哪些数据类型？')">JS有哪些数据类型？</button>
                <button onclick="quickAsk('什么是函数？')">什么是函数？</button>
                <button onclick="quickAsk('for循环怎么用？')">for循环怎么用？</button>
            </div>
        </div>
    </div>
    
    <script>
        const knowledgeBase = {
            '变量': `变量是用于存储数据的容器。JavaScript 有三种声明方式：
• var - 函数作用域，可重复声明
• let - 块级作用域，可重新赋值
• const - 块级作用域，不可重新赋值

示例：
let name = "张三";
const PI = 3.14;`,

            'let和var': `主要区别：
1. 作用域不同
   • var 是函数作用域
   • let 是块级作用域

2. 重复声明
   • var 可以重复声明
   • let 不能重复声明

3. 变量提升
   • var 会提升，初始化为 undefined
   • let 会提升，但不会初始化（暂时性死区）`,

            '数据类型': `JavaScript 有 8 种数据类型：

基本类型（7种）：
• string - 字符串
• number - 数字
• boolean - 布尔值
• null - 空值
• undefined - 未定义
• symbol - 符号（ES6）
• bigint - 大整数（ES2020）

引用类型（1种）：
• object - 对象（包括数组、函数等）`,

            '函数': `函数是一段可重复使用的代码块，用于执行特定任务。

定义方式：
1. 函数声明
   function greet(name) {
       return "Hello, " + name;
   }

2. 函数表达式
   const add = function(a, b) {
       return a + b;
   };

3. 箭头函数
   const multiply = (a, b) => a * b;`,

            'for循环': `for 循环用于重复执行代码块。

基本语法：
for (初始化; 条件; 增量) {
    // 循环体
}

示例：
for (let i = 0; i < 5; i++) {
    console.log(i);  // 输出 0,1,2,3,4
}

其他循环：
• while - 当条件为真时循环
• do...while - 至少执行一次
• for...of - 遍历可迭代对象
• for...in - 遍历对象属性`,

            '表达式': `表达式是产生值的代码片段。

算术表达式：
• + 加法
• - 减法
• * 乘法
• / 除法
• % 取余

逻辑表达式：
• && 与
• || 或
• ! 非
• === 严格相等
• !== 严格不相等

示例：
let sum = 10 + 5;      // 15
let isAdult = age >= 18;  // true/false`,

            'if': `if 语句用于条件判断。

基本语法：
if (条件) {
    // 条件为真时执行
} else if (其他条件) {
    // 其他条件为真时执行
} else {
    // 以上都不满足时执行
}

示例：
let age = 20;
if (age >= 18) {
    console.log("成年人");
} else {
    console.log("未成年人");
}`,

            '数组': `数组是用于存储多个值的单个变量。

创建数组：
let fruits = ["苹果", "香蕉", "橙子"];

常用方法：
• push() - 末尾添加元素
• pop() - 删除末尾元素
• shift() - 删除开头元素
• unshift() - 开头添加元素
• length - 获取数组长度

示例：
fruits.push("葡萄");
console.log(fruits[0]);  // "苹果"`,

            '对象': `对象是键值对的集合。

创建对象：
let person = {
    name: "张三",
    age: 25,
    greet: function() {
        return "你好，" + this.name;
    }
};

访问属性：
• person.name      // "张三"
• person["age"]    // 25
• person.greet()   // "你好，张三"`,

            '默认': `我可以帮你解答 JavaScript 基础知识问题，包括：

• 变量声明（var、let、const）
• 数据类型（string、number、boolean等）
• 表达式（算术、逻辑）
• 流程控制（if/else、for、while）
• 函数定义和调用
• 数组和对象

请直接输入你的问题，或点击上方的快捷问题！`
        };

        function addMessage(text, isUser) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function findAnswer(question) {
            const q = question.toLowerCase();
            
            if (q.includes('变量')) return knowledgeBase['变量'];
            if (q.includes('let') && q.includes('var')) return knowledgeBase['let和var'];
            if (q.includes('数据类型') || q.includes('类型')) return knowledgeBase['数据类型'];
            if (q.includes('函数')) return knowledgeBase['函数'];
            if (q.includes('for') || q.includes('循环')) return knowledgeBase['for循环'];
            if (q.includes('表达式')) return knowledgeBase['表达式'];
            if (q.includes('if') || q.includes('条件')) return knowledgeBase['if'];
            if (q.includes('数组')) return knowledgeBase['数组'];
            if (q.includes('对象')) return knowledgeBase['对象'];
            
            return knowledgeBase['默认'];
        }

        function askQuestion() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            
            if (!question) return;
            
            addMessage(question, true);
            
            setTimeout(() => {
                const answer = findAnswer(question);
                addMessage(answer, false);
            }, 500);
            
            input.value = '';
        }

        function quickAsk(question) {
            document.getElementById('questionInput').value = question;
            askQuestion();
        }
    </script>
</body>
</html>
